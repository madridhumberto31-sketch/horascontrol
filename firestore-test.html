<!DOCTYPE html>
<html>
<head>
    <title>Test Específico Firestore</title>
    <style>
        body { font-family: Arial; margin: 50px; }
        .result { padding: 15px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔥 Test Específico Firestore</h1>
    
    <div class="result info">
        <h3>Información del Proyecto</h3>
        <p><strong>Proyecto ID:</strong> horas-control</p>
        <p><strong>URL Console:</strong> <a href="https://console.firebase.google.com/project/horas-control" target="_blank">Abrir Firebase Console</a></p>
    </div>

    <button onclick="testAuth()">🔑 Step 1: Autenticar Primero</button>
    <button onclick="testFirestore()" id="firestoreBtn" disabled>🧪 Step 2: Test Firestore</button>
    
    <div id="authResult"></div>
    <div id="result"></div>

    <script type="module">
        let app, auth, db, currentUser = null;
        
        // Step 1: Authentication
        window.testAuth = async () => {
            const result = document.getElementById('authResult');
            result.innerHTML = '<div class="result info">🔄 Iniciando autenticación...</div>';
            
            try {
                // Import Firebase Auth
                const { initializeApp } = await import('https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js');
                const { getAuth, GoogleAuthProvider, signInWithPopup } = await import('https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js');
                const { getFirestore } = await import('https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js');
                
                // Initialize Firebase
                const firebaseConfig = {
                    apiKey: "AIzaSyDQA1OcmqlJD1mDd5WtxINTBTOgQl4Wivo",
                    authDomain: "horas-control.firebaseapp.com",
                    projectId: "horas-control",
                    storageBucket: "horas-control.firebasestorage.app",
                    messagingSenderId: "1035784080509",
                    appId: "1:1035784080509:web:a918e7bb3fdb1f4e187514"
                };
                
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                // Google Sign In
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                
                const userResult = await signInWithPopup(auth, provider);
                currentUser = userResult.user;
                
                const isAdmin = ['humbertoantoniomadridflores4@gmail.com', 'carlos.alexander.mezquita@clases.edu.sv'].includes(currentUser.email);
                
                result.innerHTML = `
                    <div class="result success">
                        ✅ Autenticación exitosa<br>
                        👤 Usuario: ${currentUser.displayName}<br>
                        📧 Email: ${currentUser.email}<br>
                        🔑 UID: ${currentUser.uid}<br>
                        👑 Admin: ${isAdmin ? 'Sí' : 'No'}
                    </div>
                `;
                
                // Enable Firestore test
                document.getElementById('firestoreBtn').disabled = false;
                
            } catch (error) {
                result.innerHTML = `<div class="result error">❌ Error autenticación: ${error.message}</div>`;
            }
        };

        // Step 2: Firestore Test (authenticated)
        window.testFirestore = async () => {
            if (!currentUser) {
                document.getElementById('result').innerHTML = '<div class="result error">❌ Primero debes autenticarte</div>';
                return;
            }
            
            const result = document.getElementById('result');
            result.innerHTML = '<div class="result info">🔄 Ejecutando tests con usuario autenticado...</div>';
            
            let html = '';
            
            try {
                const { doc, setDoc, getDoc, collection, addDoc, getDocs, query, where } = await import('https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js');
                
                // Test 1: Save User Profile
                html += '<h3>Test 1: Guardar Perfil Usuario</h3>';
                const userProfile = {
                    name: currentUser.displayName,
                    email: currentUser.email,
                    grade: '1° Grado',
                    section: 'A',
                    classSubjects: ['matematica', 'lenguaje'],
                    reinforcementSubjects: ['matematica'],
                    createdAt: new Date()
                };
                
                try {
                    const userDocRef = doc(db, 'users', currentUser.uid);
                    await setDoc(userDocRef, userProfile);
                    html += '<div class="result success">✅ Perfil guardado correctamente</div>';
                } catch (error) {
                    html += `<div class="result error">❌ Error guardando perfil: ${error.message} (${error.code})</div>`;
                }
                
                // Test 2: Read User Profile
                html += '<h3>Test 2: Leer Perfil Usuario</h3>';
                try {
                    const userDocRef = doc(db, 'users', currentUser.uid);
                    const userDoc = await getDoc(userDocRef);
                    
                    if (userDoc.exists()) {
                        html += '<div class="result success">✅ Perfil leído correctamente</div>';
                        html += `<pre>${JSON.stringify(userDoc.data(), null, 2)}</pre>`;
                    } else {
                        html += '<div class="result error">❌ Perfil no encontrado</div>';
                    }
                } catch (error) {
                    html += `<div class="result error">❌ Error leyendo perfil: ${error.message} (${error.code})</div>`;
                }
                
                // Test 3: Add Class Record
                html += '<h3>Test 3: Agregar Registro de Clases</h3>';
                const classRecord = {
                    userId: currentUser.uid,
                    professorName: currentUser.displayName,
                    grade: '1° Grado',
                    section: 'A',
                    date: new Date().toISOString().split('T')[0],
                    mathClasses: 3,
                    languageClasses: 2,
                    mathReinforcement: 1,
                    languageReinforcement: 0,
                    total: 6,
                    createdAt: new Date()
                };
                
                try {
                    const docRef = await addDoc(collection(db, 'classes'), classRecord);
                    html += `<div class="result success">✅ Registro agregado con ID: ${docRef.id}</div>`;
                } catch (error) {
                    html += `<div class="result error">❌ Error agregando registro: ${error.message} (${error.code})</div>`;
                }
                
                // Test 4: Read Own Class Records
                html += '<h3>Test 4: Leer Mis Registros</h3>';
                try {
                    const q = query(collection(db, 'classes'), where('userId', '==', currentUser.uid));
                    const querySnapshot = await getDocs(q);
                    
                    html += `<div class="result success">✅ Registros encontrados: ${querySnapshot.size}</div>`;
                    
                    if (querySnapshot.size > 0) {
                        html += '<div class="result info"><strong>Registros:</strong></div>';
                        querySnapshot.forEach((doc) => {
                            const data = doc.data();
                            html += `<pre>ID: ${doc.id}\nFecha: ${data.date}\nTotal clases: ${data.total}</pre>`;
                        });
                    }
                    
                } catch (error) {
                    html += `<div class="result error">❌ Error leyendo registros: ${error.message} (${error.code})</div>`;
                }
                
                // Test 5: Admin Test (if admin)
                const isAdmin = ['humbertoantoniomadridflores4@gmail.com', 'carlos.alexander.mezquita@clases.edu.sv'].includes(currentUser.email);
                if (isAdmin) {
                    html += '<h3>Test 5: Lectura Admin (Todos los Registros)</h3>';
                    try {
                        const allClassesSnapshot = await getDocs(collection(db, 'classes'));
                        html += `<div class="result success">✅ Admin puede leer todos los registros: ${allClassesSnapshot.size}</div>`;
                    } catch (error) {
                        html += `<div class="result error">❌ Error admin leyendo todo: ${error.message} (${error.code})</div>`;
                    }
                }
                
                html += '<div class="result success">🎉 TODAS LAS PRUEBAS COMPLETADAS</div>';
                html += '<div class="result success">La aplicación debería funcionar correctamente ahora.</div>';
                
            } catch (error) {
                html += `<div class="result error">💥 ERROR CRÍTICO: ${error.message}</div>`;
            }
            
            result.innerHTML = html;
        };
    </script>
</body>
</html>
