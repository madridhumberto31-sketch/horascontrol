<!DOCTYPE html>
<html>
<head>
    <title>Test Firebase</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 800px; 
            margin: 50px auto; 
            padding: 20px; 
        }
        button { 
            padding: 15px 30px; 
            margin: 10px; 
            font-size: 16px; 
            cursor: pointer; 
        }
        .login-btn { background: #4285f4; color: white; border: none; }
        .result { 
            padding: 20px; 
            margin: 20px 0; 
            background: #f5f5f5; 
            border-radius: 5px; 
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>🔥 Test Control de Horas</h1>
    
    <div id="step1">
        <h2>1. Login con Google</h2>
        <button id="loginBtn" class="login-btn">🔑 Login con Google</button>
        <div id="loginResult" class="result hidden"></div>
    </div>
    
    <div id="step2" class="hidden">
        <h2>2. Guardar Perfil</h2>
        <label>Grado:</label>
        <select id="grade">
            <option value="1° Grado">1° Grado</option>
            <option value="2° Grado">2° Grado</option>
        </select><br><br>
        
        <label>Sección:</label>
        <select id="section">
            <option value="A">A</option>
            <option value="B">B</option>
        </select><br><br>
        
        <label><input type="checkbox" id="matClase"> Matemática Clase</label><br>
        <label><input type="checkbox" id="lenClase"> Lenguaje Clase</label><br>
        <label><input type="checkbox" id="matRef"> Matemática Refuerzo</label><br>
        <label><input type="checkbox" id="lenRef"> Lenguaje Refuerzo</label><br><br>
        
        <button id="saveBtn">💾 Guardar Perfil</button>
        <div id="saveResult" class="result hidden"></div>
    </div>
    
    <div id="step3" class="hidden">
        <h2>3. Registrar Clases</h2>
        <input type="date" id="fecha"><br><br>
        <label>Clases Matemática: <input type="number" id="claMat" min="0" max="10"></label><br>
        <label>Clases Lenguaje: <input type="number" id="claLen" min="0" max="10"></label><br>
        <label>Refuerzos Matemática: <input type="number" id="refMat" min="0" max="10"></label><br>
        <label>Refuerzos Lenguaje: <input type="number" id="refLen" min="0" max="10"></label><br><br>
        
        <button id="addBtn">➕ Agregar Registro</button>
        <div id="addResult" class="result hidden"></div>
    </div>
    
    <div id="step4" class="hidden">
        <h2>4. Ver Registros</h2>
        <button id="loadBtn">📋 Cargar Mis Registros</button>
        <div id="loadResult" class="result hidden"></div>
    </div>

    <script type="module">
        // Import Firebase
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, addDoc, collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js';

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyDQA1OcmqlJD1mDd5WtxINTBTOgQl4Wivo",
            authDomain: "horas-control.firebaseapp.com",
            projectId: "horas-control",
            storageBucket: "horas-control.firebasestorage.app",
            messagingSenderId: "1035784080509",
            appId: "1:1035784080509:web:a918e7bb3fdb1f4e187514"
        };

        // Initialize
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // Set today's date
        document.getElementById('fecha').value = new Date().toISOString().split('T')[0];

        // Step 1: Login
        document.getElementById('loginBtn').onclick = async () => {
            const btn = document.getElementById('loginBtn');
            const result = document.getElementById('loginResult');
            
            btn.textContent = '🔄 Conectando...';
            btn.disabled = true;
            
            try {
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                
                const userResult = await signInWithPopup(auth, provider);
                currentUser = userResult.user;
                
                result.innerHTML = `✅ Login exitoso: ${currentUser.email}`;
                result.classList.remove('hidden');
                
                document.getElementById('step2').classList.remove('hidden');
                
            } catch (error) {
                result.innerHTML = `❌ Error: ${error.message}`;
                result.classList.remove('hidden');
                
                btn.textContent = '🔑 Login con Google';
                btn.disabled = false;
            }
        };

        // Step 2: Save Profile
        document.getElementById('saveBtn').onclick = async () => {
            const btn = document.getElementById('saveBtn');
            const result = document.getElementById('saveResult');
            
            btn.textContent = '💾 Guardando...';
            btn.disabled = true;
            
            try {
                const grade = document.getElementById('grade').value;
                const section = document.getElementById('section').value;
                
                const classSubjects = [];
                if (document.getElementById('matClase').checked) classSubjects.push('matematica');
                if (document.getElementById('lenClase').checked) classSubjects.push('lenguaje');
                
                const reinforcementSubjects = [];
                if (document.getElementById('matRef').checked) reinforcementSubjects.push('matematica');
                if (document.getElementById('lenRef').checked) reinforcementSubjects.push('lenguaje');
                
                const profile = {
                    name: currentUser.displayName,
                    email: currentUser.email,
                    grade: grade,
                    section: section,
                    classSubjects: classSubjects,
                    reinforcementSubjects: reinforcementSubjects,
                    createdAt: new Date()
                };
                
                await setDoc(doc(db, 'users', currentUser.uid), profile);
                
                result.innerHTML = `✅ Perfil guardado correctamente`;
                result.classList.remove('hidden');
                
                document.getElementById('step3').classList.remove('hidden');
                document.getElementById('step4').classList.remove('hidden');
                
            } catch (error) {
                result.innerHTML = `❌ Error guardando: ${error.message}`;
                result.classList.remove('hidden');
            }
            
            btn.textContent = '💾 Guardar Perfil';
            btn.disabled = false;
        };

        // Step 3: Add Hours
        document.getElementById('addBtn').onclick = async () => {
            const btn = document.getElementById('addBtn');
            const result = document.getElementById('addResult');
            
            btn.textContent = '➕ Guardando...';
            btn.disabled = true;
            
            try {
                const fecha = document.getElementById('fecha').value;
                const claMat = parseInt(document.getElementById('claMat').value) || 0;
                const claLen = parseInt(document.getElementById('claLen').value) || 0;
                const refMat = parseInt(document.getElementById('refMat').value) || 0;
                const refLen = parseInt(document.getElementById('refLen').value) || 0;
                
                const entry = {
                    userId: currentUser.uid,
                    professorName: currentUser.displayName,
                    date: fecha,
                    mathClasses: claMat,
                    languageClasses: claLen,
                    mathReinforcement: refMat,
                    languageReinforcement: refLen,
                    total: claMat + claLen + refMat + refLen,
                    createdAt: new Date()
                };
                
                await addDoc(collection(db, 'classes'), entry);
                
                result.innerHTML = `✅ Registro agregado: ${entry.total} clases total`;
                result.classList.remove('hidden');
                
                // Clear form
                document.getElementById('claMat').value = '';
                document.getElementById('claLen').value = '';
                document.getElementById('refMat').value = '';
                document.getElementById('refLen').value = '';
                
            } catch (error) {
                result.innerHTML = `❌ Error agregando: ${error.message}`;
                result.classList.remove('hidden');
            }
            
            btn.textContent = '➕ Agregar Registro';
            btn.disabled = false;
        };

        // Step 4: Load Data
        document.getElementById('loadBtn').onclick = async () => {
            const btn = document.getElementById('loadBtn');
            const result = document.getElementById('loadResult');
            
            btn.textContent = '📋 Cargando...';
            btn.disabled = true;
            
            try {
                const q = query(collection(db, 'classes'), where('userId', '==', currentUser.uid));
                const querySnapshot = await getDocs(q);
                
                let html = '<h3>Mis Registros:</h3><table border="1" style="width:100%"><tr><th>Fecha</th><th>Mat Clase</th><th>Len Clase</th><th>Mat Ref</th><th>Len Ref</th><th>Total</th></tr>';
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    html += `<tr>
                        <td>${data.date}</td>
                        <td>${data.mathClasses}</td>
                        <td>${data.languageClasses}</td>
                        <td>${data.mathReinforcement}</td>
                        <td>${data.languageReinforcement}</td>
                        <td><strong>${data.total}</strong></td>
                    </tr>`;
                });
                
                html += '</table>';
                
                result.innerHTML = html;
                result.classList.remove('hidden');
                
            } catch (error) {
                result.innerHTML = `❌ Error cargando: ${error.message}`;
                result.classList.remove('hidden');
            }
            
            btn.textContent = '📋 Cargar Mis Registros';
            btn.disabled = false;
        };
    </script>
</body>
</html>
